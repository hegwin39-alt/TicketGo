{% extends "base.html" %}

{% block title %}Оформление заказа | TicketGo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="bg-white p-4 p-md-5 rounded-4 shadow-soft">
            <h1 class="fw-bold mb-4">Оформление билета</h1>

            <div class="mb-4">
                <h4 class="mb-2">{{ event.title }}</h4>
                <p class="text-muted mb-1">{{ event.date }} | {{ event.time }}</p>
                <p class="text-muted mb-1">{{ event.location }}</p>
                <p class="fw-bold mb-0">Цена за 1 билет: {{ event.price }} ₽</p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Ваше имя</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Количество билетов</label>
                    <input type="number" name="tickets_count" class="form-control" min="1" value="1" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Подтвердить заказ</button>
                    <a href="{% url 'event_detail' event.id %}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
